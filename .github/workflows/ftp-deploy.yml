name: Deploy via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'wp-content/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy → Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wp-content/
          server-dir: /www.in3c.org/wp-content/
          exclude: |
            **/.git*
            **/node_modules/**
            **/uploads/**
            **/cache/**
            **/languages/**
            **/upgrade/**
            **/updraft/**
            **/backup-db/**
            **/*.log
            **/*.tmp
            **/*.bak
